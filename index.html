<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luxury Scroll Experience</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Poppins', sans-serif;
  background:#0c0c0c;
  color:white;
  overflow-x:hidden;
}

.section{
  height:250vh;
  position:relative;
}

.track{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:linear-gradient(to bottom,#0c0c0c,#1a1a1a);
}

.bg-glow{
  position:absolute;
  width:800px;
  height:800px;
  background:radial-gradient(circle, rgba(69,219,125,0.2), transparent 70%);
  filter:blur(100px);
  z-index:1;
  will-change:transform;
}

.road{
  position:relative;
  width:100vw;
  height:240px;
  background:#141414;
  border-top:2px solid #222;
  border-bottom:2px solid #222;
  overflow:hidden;
}

.road::before{
  content:"";
  position:absolute;
  width:200%;
  height:4px;
  top:50%;
  background:repeating-linear-gradient(
    90deg,
    #fff 0px,
    #fff 40px,
    transparent 40px,
    transparent 80px
  );
  opacity:0.2;
  animation: moveStripes 30s linear infinite;
}

@keyframes moveStripes {
  0% { transform: translateX(0); }
  100% { transform: translateX(-80px); }
}

.car{
  position:absolute;
  height:240px;
  top:0;
  left:0px;
  z-index:10;
  will-change:transform;
}

.trail{
  position:absolute;
  height:240px;
  top:0;
  left:0;
  width:0;
  background:linear-gradient(to right,#45db7d,transparent);
  z-index:2;
}

.value-add{
  position:absolute;
  top:35%;
  right:5%;
  font-size:5rem;
  font-weight:800;
  letter-spacing:0.6rem;
  display:flex;
  flex-direction: row-reverse;
  z-index:6;
}

.value-letter{
  opacity:0;
  transform:translateY(50px);
}

.speed-box{
  position:absolute;
  top:15%;
  right:5%;
  font-size:3rem;
  font-weight:700;
  opacity:0.8;
  z-index:6;
}

.text-box{
  position:absolute;
  opacity:0;
  transform:translateY(40px);
  padding:25px 30px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(69,219,125,0.4);
  box-shadow:
    0 0 25px rgba(69,219,125,0.25),
    0 0 60px rgba(69,219,125,0.15),
    0 10px 40px rgba(0,0,0,0.6);

  transition: all 0.3s ease;
}
.text-box:hover{
  transform: translateY(-5px);
  box-shadow:
    0 0 35px rgba(69,219,125,0.9),
    0 0 80px rgba(69,219,125,0.40),
    0 20px 60px rgba(0,0,0,0.7);
}

.num-box{
  font-size:48px;
  font-weight:700;
  display:block;
}

#box1{ top:10%; right:30%;}
#box2{ bottom:12%; right:32%;}
#box3{ top:10%; right:10%;}
#box4{ bottom:12%; right:10%;}

@media(max-width:768px){
  .value-add{ font-size:2.5rem; }
  .speed-box{ font-size:1.5rem; }
  .num-box{ font-size:32px; }
}
</style>
</head>

<body>
<div class="section">
  <div class="track">
    <div class="bg-glow"></div>

    <div class="road">
      <img 
      src="https://paraschaturvedi.github.io/car-scroll-animation/McLaren%20720S%202022%20top%20view.png"
      class="car"
      id="car">

      <div class="trail" id="trail"></div>

      <div class="value-add">
        <span class="value-letter">Z</span>
        <span class="value-letter">A</span>
        <span class="value-letter">F</span>
        <span class="value-letter">Z</span>
        <span class="value-letter">Z</span>
        <span class="value-letter">T</span>
        <span class="value-letter">I</span>
        <span class="value-letter">&nbsp;</span>
        <span class="value-letter">E</span>
        <span class="value-letter">M</span>
        <span class="value-letter">O</span>
        <span class="value-letter">C</span>
        <span class="value-letter">L</span>
        <span class="value-letter">E</span>
        <span class="value-letter">W</span>
      </div>

      <div class="speed-box">
        <span id="speed">0</span> km/h
      </div>
    </div>

    <div class="text-box" id="box1">
      <span class="num-box">58%</span>
      Increase in pickup usage
    </div>

    <div class="text-box" id="box2">
      <span class="num-box">23%</span>
      Fewer customer calls
    </div>

    <div class="text-box" id="box3">
      <span class="num-box">27%</span>
      Faster deliveries
    </div>

    <div class="text-box" id="box4">
      <span class="num-box">40%</span>
      Better satisfaction
    </div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

const car = document.getElementById("car");
const trail = document.getElementById("trail");
const speedEl = document.getElementById("speed");
const glow = document.querySelector(".bg-glow");
const letters = gsap.utils.toArray(".value-letter");

gsap.set(letters, { opacity: 0, y: 40 });
gsap.set(".text-box", { opacity: 0, x: -150, scale: 0.8,filter: "blur(10px)"  });
gsap.set(car, { x: "-100%" });

const roadWidth = window.innerWidth;
const carWidth = 300;
const viewportWidth = window.innerWidth;
const startX = -0.25 * viewportWidth;
const endX = viewportWidth - carWidth + 0.25 * viewportWidth;

gsap.to(car, {
  x: endX,
  rotate: 3,
  ease: "none",
  scrollTrigger: {
    trigger: ".section",
    start: "top top",
    end: "bottom top",
    scrub: 1.5,
    pin: ".track",
    onUpdate: self => {
      let progress = self.progress;
      let speed = Math.floor(progress * 320);
      speedEl.textContent = speed;

      let carX = gsap.getProperty(car, "x") + carWidth / 2;
      gsap.set(trail, { width: carX - 40 });

      gsap.set(glow, {
        x: progress * 400 - 200,
        y: progress * 200 - 100,
        scale: 1 + progress * 0.5
      });

      letters.forEach((letter, i) => {
        let letterRect = letter.getBoundingClientRect();
        let letterX = letterRect.left + window.scrollX;
        
        let letterWidth = letterRect.width;
        if (carX > letterX + letterWidth + 50) {
          gsap.to(letter, {
            opacity: 1,
            y: 0,
            duration: 0.3,
            overwrite: true
          });
        } else {
          gsap.to(letter, {
            opacity: 0,
            y: 40,
            duration: 0.3,
            overwrite: true
          });
        }
      });
    }
  }
});

gsap.utils.toArray(".text-box").forEach((box, i) => {
  gsap.to(box, {
    x: 0,
    opacity: 1, scale: 1, filter: "blur(0px)",
    ease: "back.out(1.4)",
    scrollTrigger: {
      trigger: ".section",
      start: () => "top+=" + (300 + i * 220) + " top",
      end: () => "top+=" + (500 + i * 220) + " top",
      scrub: 1.2
    }
  });
});
</script>
</body>
</html>
